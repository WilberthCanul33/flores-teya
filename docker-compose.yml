services:
  db:
    image: postgres:15
    container_name: organic_veggies_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=organic_veggies_db
      - POSTGRES_USER=organic_user
      - POSTGRES_PASSWORD=Alberto2320c
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organic_user -d organic_veggies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: organic_veggies_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DOCKER_CONTAINER=true  # ¡Esta es la clave!
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data: