services:
  db:
    image: postgres:15
    container_name: organic_veggies_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DOCKER_DB_NAME}
      - POSTGRES_USER=${DOCKER_DB_USER}
      - POSTGRES_PASSWORD=${DOCKER_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_DB_USER} -d ${DOCKER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: organic_veggies_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
         python manage.py collectstatic --noinput &&
         gunicorn organic_veggies.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DOCKER_CONTAINER=true  # ¡Esta es la clave!
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data: